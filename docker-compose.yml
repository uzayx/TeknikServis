services:
  postgres:
    image: postgres:16-alpine
    container_name: teknikservis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teknikservis
      POSTGRES_PASSWORD: TeknikServis2026!
      POSTGRES_DB: teknikservis_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teknikservis -d teknikservis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teknikservis-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teknikservis-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teknikservis.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teknikservis-network

volumes:
  postgres_data:

networks:
  teknikservis-network:
    driver: bridge
