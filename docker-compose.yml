services:
  postgres:
    image: postgres:16-alpine
    container_name: teknikservis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: teknikservis
      POSTGRES_PASSWORD: TeknikServis2026!
      POSTGRES_DB: teknikservis_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teknikservis -d teknikservis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teknikservis-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teknikservis-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development          # Swagger acik kalsin (case study)
      # Container aginda "localhost" container'in kendisidir; Postgres'e
      # compose servis adiyla (postgres) ve IC port (5432) ile ulasilir.
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=teknikservis_db;Username=teknikservis;Password=TeknikServis2026!;Include Error Detail=true"
      # Ilk acilista semayi otomatik kurar. Uretimde bu is pipeline'da yapilir
      # (coklu instance ayni anda migrate etmeye calisirsa yaris olusur).
      Database__ApplyMigrationsOnStartup: "true"
    ports:
      - "5062:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teknikservis-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: teknikservis-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@teknikservis.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teknikservis-network

volumes:
  postgres_data:

networks:
  teknikservis-network:
    driver: bridge
